<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyBoard 配置</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e0e0e0;
  --text-dim: #607080;
  --accent: #e94560;
  --save: #00c853;
  --save-hover: #00e676;
  --red: #e94560;
  --blue: #4d7cf5;
  --tab-inactive: #0d1b2a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* === Topbar === */
.topbar {
  background: var(--surface);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #2a2a4a;
  flex-shrink: 0;
  gap: 16px;
}
.topbar h1 {
  font-size: 17px;
  font-weight: 600;
  white-space: nowrap;
}
.topbar-center {
  display: flex;
  align-items: center;
  gap: 4px;
}
.topbar-center .tab-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  background: none;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.topbar-center .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.topbar-center .tab-btn.active {
  color: #fff;
  background: var(--accent);
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.save-btn {
  background: var(--save);
  color: #000;
  border: none;
  padding: 6px 20px;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.save-btn:hover { background: var(--save-hover); }
.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.save-status {
  font-size: 11px;
  margin-right: 10px;
  color: var(--text-dim);
}

/* === Main content === */
.main {
  flex: 1;
  padding: 16px 20px;
  overflow-y: auto;
  max-width: 700px;
  margin: 0 auto;
  width: 100%;
}
.tab-page { display: none; }
.tab-page.active { display: flex; flex-direction: column; gap: 16px; }
#page-calibrate.active { gap: 10px; }
#page-calibrate .panel { padding: 10px 16px; }
#page-calibrate .joystick-row { gap: 8px; }
#page-calibrate .joystick-row.cal-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 0 20px;
}
#page-calibrate .joystick-row.cal-row .joystick-box.cal {
  flex: 0 1 240px;
  min-width: 0;
}
#page-calibrate p { margin-bottom: 4px !important; font-size: 10px !important; }
#page-calibrate .panel h2 { margin-bottom: 6px; }

/* === Panel === */
.panel {
  background: var(--surface);
  border-radius: 8px;
  padding: 14px 16px;
  border: 1px solid #2a2a4a;
}
.panel h2 {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}

/* === Joystick === */
.joystick-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.joystick-box canvas {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 6px;
  cursor: default;
  touch-action: none;
}
.joystick-box.cal canvas {
  max-height: 240px;
  aspect-ratio: 1 !important;
  width: 100%;
}
.joystick-box.cal .coords-row {
  font-size: 10px;
  margin-top: 3px;
}
.joystick-box.cal .coords-row .coord-value {
  min-width: 38px;
  padding: 0 4px;
}
.coords-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 12px;
  margin-top: 6px;
}
.coords-row .coord-label { color: var(--text-dim); font-size: 10px; }
.coords-row .coord-value {
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 3px;
  min-width: 48px;
  text-align: right;
}

/* === Calibration section divider === */
.cal-section-title {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
  padding-bottom: 3px;
  border-bottom: 1px solid #2a2a4a;
}

/* === Matrix grid === */
.matrix-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.matrix-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
}
.matrix-cell {
  aspect-ratio: 1.4;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
  border: 1.5px solid transparent;
  background: transparent;
  color: var(--text-dim);
  border-color: var(--text-dim);
  opacity: 0.35;
}
.matrix-cell.cell-l { border-color: var(--red); color: var(--red); opacity: 0.5; }
.matrix-cell.cell-r { border-color: var(--blue); color: var(--blue); opacity: 0.5; }
.matrix-cell.cell-selected { opacity: 1; }
.matrix-cell.cell-selected.cell-l { background: var(--red); color: #fff; opacity: 1; }
.matrix-cell.cell-selected.cell-r { background: var(--blue); color: #fff; opacity: 1; }
.matrix-cell.cell-active { background: #fff !important; color: #000 !important; opacity: 1 !important; border-color: #fff !important; }

/* === Config form === */
.config-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.config-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.config-field label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.config-field input, .config-field select {
  background: var(--bg);
  border: 1px solid #2a2a4a;
  border-radius: 3px;
  padding: 5px 8px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Consolas', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.config-field input:focus, .config-field select:focus { border-color: var(--accent); }
.config-section-title {
  grid-column: 1 / -1;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-top: 6px;
  padding-bottom: 3px;
  border-bottom: 1px solid #2a2a4a;
}

/* === Status bar === */
.status-bar {
  background: var(--surface);
  border-top: 1px solid #2a2a4a;
  padding: 6px 20px;
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}
.status-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 5px;
}
.status-dot.connected { background: var(--save); }
.status-dot.disconnected { background: var(--accent); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <h1>🎮 JoyBoard</h1>
  <div class="topbar-center">
    <button class="tab-btn active" data-tab="matrix">⌨️ 输入矩阵配置</button>
    <button class="tab-btn" data-tab="calibrate">🎯 摇杆校准配置</button>
  </div>
  <div class="topbar-right">
    <span class="save-status" id="saveStatus"></span>
    <button class="save-btn" id="saveBtn" disabled>💾 保存</button>
  </div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Tab: 输入矩阵配置 -->
  <div class="tab-page active" id="page-matrix">
    <div class="panel">
      <h2>⌨️ 按键矩阵</h2>
      <div class="matrix-row">
        <div><div class="matrix-grid" id="matrixL"></div></div>
        <div><div class="matrix-grid" id="matrixR"></div></div>
      </div>
    </div>
    <div class="panel">
      <h2>� 摇杆映射网格</h2>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">拖拽顶点调整网格 · 虚线圆为摇杆行程参考</p>
      <div class="joystick-row">
        <div class="joystick-box"><canvas id="canvasL" width="400" height="400"></canvas>
          <div class="coords-row">
            <span class="coord-label">X</span><span class="coord-value" id="coordLx">0.000</span>
            <span class="coord-label">Y</span><span class="coord-value" id="coordLy">0.000</span>
          </div>
        </div>
        <div class="joystick-box"><canvas id="canvasR" width="400" height="400"></canvas>
          <div class="coords-row">
            <span class="coord-label">X</span><span class="coord-value" id="coordRx">0.000</span>
            <span class="coord-label">Y</span><span class="coord-value" id="coordRy">0.000</span>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <h2>⚙️ 参数配置</h2>
      <div class="config-grid" id="configForm"></div>
    </div>
  </div>

  <!-- Tab: 摇杆校准配置 -->
  <div class="tab-page" id="page-calibrate">
    <div class="panel">
      <h2>🎯 摇杆校准</h2>
      <div class="config-grid" id="calibrateForm"></div>
    </div>
    <div class="panel">
      <div class="cal-section-title">📡 校正前读数</div>
      <p style="font-size:10px;color:var(--text-dim);margin-bottom:6px;">灰色圆区域 = 中心死区 · 未经过任何校正的原始值</p>
      <div class="joystick-row cal-row">
        <div class="joystick-box cal"><canvas id="canvasRawL" width="400" height="400"></canvas>
          <div class="coords-row">
            <span class="coord-label">X</span><span class="coord-value" id="coordRawLx">0.000</span>
            <span class="coord-label">Y</span><span class="coord-value" id="coordRawLy">0.000</span>
          </div>
        </div>
        <div class="joystick-box cal"><canvas id="canvasRawR" width="400" height="400"></canvas>
          <div class="coords-row">
            <span class="coord-label">X</span><span class="coord-value" id="coordRawRx">0.000</span>
            <span class="coord-label">Y</span><span class="coord-value" id="coordRawRy">0.000</span>
          </div>
        </div>
      </div>
      <div class="cal-section-title" style="margin-top:10px;">✅ 校正后读数</div>
      <p style="font-size:10px;color:var(--text-dim);margin-bottom:6px;">经过死区、曲线校正后的最终输出值</p>
      <div class="joystick-row cal-row">
        <div class="joystick-box cal"><canvas id="canvasCalL" width="400" height="400"></canvas>
          <div class="coords-row">
            <span class="coord-label">X</span><span class="coord-value" id="coordCalLx">0.000</span>
            <span class="coord-label">Y</span><span class="coord-value" id="coordCalLy">0.000</span>
          </div>
        </div>
        <div class="joystick-box cal"><canvas id="canvasCalR" width="400" height="400"></canvas>
          <div class="coords-row">
            <span class="coord-label">X</span><span class="coord-value" id="coordCalRx">0.000</span>
            <span class="coord-label">Y</span><span class="coord-value" id="coordCalRy">0.000</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Status Bar -->
<div class="status-bar">
  <span><span class="status-dot disconnected" id="statusDot"></span><span id="statusText">未连接</span></span>
  <span>v0.1.0</span>
</div>

<script>
const DEFAULT_CONFIG = {
  evdev_path: "/dev/input/event0",
  log_level: "info",
  joystick: {
    left: {
      deadzone: { center: 0.15, edge: 0.95 },
      curve: { curve_type: "quadratic", power: 2.0 },
    },
    right: {
      deadzone: { center: 0.15, edge: 0.95 },
      curve: { curve_type: "quadratic", power: 2.0 },
    },
    range_max: 4096
  },
  mouse: {
    sensitivity: 1.0,
    fine_control: { enable: true, dpi_scale: 0.25 }
  },
  button_mode: {
    tap_threshold_ms: 180,
    hold_threshold_ms: 400,
    double_tap_interval_ms: 300
  },
  joystick_grid: {
    left: { vertices: [
      [-1,-1],[-0.6,-1],[-0.2,-1],[0.2,-1],[0.6,-1],[1,-1],
      [-1,-0.33],[-0.6,-0.33],[-0.2,-0.33],[0.2,-0.33],[0.6,-0.33],[1,-0.33],
      [-1,0.33],[-0.6,0.33],[-0.2,0.33],[0.2,0.33],[0.6,0.33],[1,0.33],
      [-1,1],[-0.6,1],[-0.2,1],[0.2,1],[0.6,1],[1,1]
    ]},
    right: { vertices: [
      [-1,-1],[-0.6,-1],[-0.2,-1],[0.2,-1],[0.6,-1],[1,-1],
      [-1,-0.33],[-0.6,-0.33],[-0.2,-0.33],[0.2,-0.33],[0.6,-0.33],[1,-0.33],
      [-1,0.33],[-0.6,0.33],[-0.2,0.33],[0.2,0.33],[0.6,0.33],[1,0.33],
      [-1,1],[-0.6,1],[-0.2,1],[0.2,1],[0.6,1],[1,1]
    ]}
  }
};
const BASE_LAYOUT = [["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l",";"],["z","x","c","v","b","n","m",",",".","/"]];
const FN_LAYOUT = [["!1","@2","#3","$4","%5","^6","&7","*8","(9",")0"],["F1","F2","F3","F4","F5","~`"," ","_-","'","+="],["F6","F7","F8","F9","F10","F11","F12","{","}","|"]];

let config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let joystickState = { L: { x: 0, y: 0 }, R: { x: 0, y: 0 } };
let rawJoystickState = { L: { x: 0, y: 0 }, R: { x: 0, y: 0 } };
let matrixMode = "base";
let pressedL3 = false, pressedR3 = false;
let selectedCell = { L: null, R: null };
let dragState = null;
let dirty = false;

// ==================== TAB SWITCHING ====================
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-page").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("page-" + btn.dataset.tab).classList.add("active");
    // Redraw canvases when switching tabs
    setTimeout(() => {
      if (btn.dataset.tab === "matrix") {
        drawGrid("canvasL", "L"); drawGrid("canvasR", "R");
      } else {
        drawCalGrid("canvasRawL", "L", true);
        drawCalGrid("canvasRawR", "R", true);
        drawCalGrid("canvasCalL", "L", false);
        drawCalGrid("canvasCalR", "R", false);
      }
    }, 50);
  });
});

// ==================== CANVAS ====================
function initCanvas(canvas) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height, pad = 35;
  const scaleX = (W - 2*pad) / 2, scaleY = (H - 2*pad) / 2;
  const cx = W/2, cy = H/2;
  function toScreen(vx, vy) { return [cx + vx * scaleX, cy + vy * scaleY]; }
  function toWorld(sx, sy) { return [(sx - cx) / scaleX, (sy - cy) / scaleY]; }
  return { ctx, W, H, pad, scaleX, scaleY, cx, cy, toScreen, toWorld };
}

function drawGrid(canvasId, side) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const c = initCanvas(canvas);
  const { ctx, W, H, cx, cy, scaleX, scaleY, toScreen } = c;
  const verts = (side === "L" ? config.joystick_grid.left : config.joystick_grid.right).vertices;
  const isLeft = side === "L";

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#0d1b2a";
  ctx.fillRect(0, 0, W, H);

  // Dashed circle (radius 1.0 = full joystick range)
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = "#1e3a5f";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, Math.min(scaleX, scaleY) * 1.0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Grid lines
  ctx.strokeStyle = "#1e3a5f";
  ctx.lineWidth = 1;
  for (let row = 0; row < 4; row++) {
    for (let col = 0; col < 6; col++) {
      const idx = row * 6 + col;
      if (col < 5) {
        const p1 = toScreen(verts[idx][0], verts[idx][1]);
        const p2 = toScreen(verts[idx+1][0], verts[idx+1][1]);
        ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
      }
      if (row < 3) {
        const p1 = toScreen(verts[idx][0], verts[idx][1]);
        const p2 = toScreen(verts[idx+6][0], verts[idx+6][1]);
        ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
      }
    }
  }

  // Cell fill
  const cellColor = isLeft
    ? (pressedL3 ? "rgba(255,255,255,0.12)" : "rgba(233,69,96,0.08)")
    : (pressedR3 ? "rgba(255,255,255,0.12)" : "rgba(77,124,245,0.08)");
  const cellStroke = isLeft
    ? (pressedL3 ? "rgba(255,255,255,0.25)" : "rgba(233,69,96,0.2)")
    : (pressedR3 ? "rgba(255,255,255,0.25)" : "rgba(77,124,245,0.2)");
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 5; col++) {
      const i0 = row*6+col, i1 = row*6+col+1, i2 = (row+1)*6+col+1, i3 = (row+1)*6+col;
      const p = [verts[i0], verts[i1], verts[i2], verts[i3]];
      ctx.beginPath();
      let s = toScreen(p[0][0], p[0][1]);
      ctx.moveTo(s[0], s[1]);
      for (let k = 1; k < 4; k++) { s = toScreen(p[k][0], p[k][1]); ctx.lineTo(s[0], s[1]); }
      ctx.closePath();
      ctx.fillStyle = cellColor;
      ctx.fill();
      ctx.strokeStyle = cellStroke;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Axis labels
  ctx.fillStyle = "#2a4a6a";
  ctx.font = "10px 'Consolas', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  ctx.fillText("X-", 5, cy-4);
  ctx.fillText("X+", W-5, cy-4);
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  ctx.fillText("Y-", cx-4, 7);
  ctx.fillText("Y+", cx-4, H-7);

  // Vertices (draggable)
  for (let i = 0; i < verts.length; i++) {
    const [sx, sy] = toScreen(verts[i][0], verts[i][1]);
    ctx.beginPath();
    ctx.arc(sx, sy, i % 6 === 0 || i % 6 === 5 || i < 6 || i >= 18 ? 3 : 5, 0, Math.PI*2);
    ctx.fillStyle = "#5a7a9a";
    ctx.fill();
    if (dragState && dragState.side === side && dragState.vertexIdx === i) {
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
    }
  }

  // Joystick position dot
  const js = side === "L" ? joystickState.L : joystickState.R;
  const jx = Math.max(-1, Math.min(1, js.x));
  const jy = Math.max(-1, Math.min(1, js.y));
  const [dotX, dotY] = toScreen(jx, jy);
  ctx.strokeStyle = isLeft ? "rgba(233,69,96,0.25)" : "rgba(77,124,245,0.25)";
  ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(dotX, cy); ctx.lineTo(dotX, dotY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, dotY); ctx.lineTo(dotX, dotY); ctx.stroke();
  ctx.setLineDash([]);
    const grad = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 12);
    grad.addColorStop(0, isLeft ? "rgba(233,69,96,0.5)" : "rgba(77,124,245,0.5)");
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(dotX, dotY, 12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(dotX, dotY, 4, 0, Math.PI*2);
    ctx.fillStyle = isLeft ? "#e94560" : "#4d7cf5";
    ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke();
}

// ==================== CALIBRATION CANVAS ====================
function drawCalGrid(canvasId, side, showDeadzone) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const c = initCanvas(canvas);
  const { ctx, W, H, cx, cy, scaleX, scaleY, toScreen } = c;
  const isLeft = side === "L";
  const maxR = Math.min(scaleX, scaleY);

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#0d1b2a";
  ctx.fillRect(0, 0, W, H);

  // Dashed circle (radius 1.0)
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = "#1e3a5f";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Deadzone indicators (only for raw view)
    if (showDeadzone) {
      const sideKey = side === "L" ? "left" : "right";
      const dzCenter = config.joystick[sideKey].deadzone.center;
      const dzEdge = config.joystick[sideKey].deadzone.edge;
      // Center deadzone — inner circle
      const dzRadIn = maxR * dzCenter;
      ctx.fillStyle = "rgba(255,255,255,0.04)";
      ctx.beginPath(); ctx.arc(cx, cy, dzRadIn, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.arc(cx, cy, dzRadIn, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);

      // Edge deadzone — outer ring
      const dzRadOut = maxR * dzEdge;
      ctx.strokeStyle = "rgba(255,200,0,0.15)";
      ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.arc(cx, cy, dzRadOut, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      // Shade the edge deadzone ring
      ctx.beginPath();
      ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
      ctx.arc(cx, cy, dzRadOut, 0, Math.PI * 2, true);
      ctx.closePath();
      ctx.fillStyle = "rgba(255,200,0,0.04)";
      ctx.fill();
    }

  // Center crosshair (calibrated view)
  if (!showDeadzone) {
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy); ctx.lineTo(cx + 12, cy);
    ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy + 12);
    ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle = "#2a4a6a";
  ctx.font = "10px 'Consolas', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  ctx.fillText("X-", 5, cy-4);
  ctx.fillText("X+", W-5, cy-4);
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  ctx.fillText("Y-", cx-4, 7);
  ctx.fillText("Y+", cx-4, H-7);

  // Joystick position dot
  const js = showDeadzone ? rawJoystickState : joystickState;
  const stick = side === "L" ? js.L : js.R;
  const jx = Math.max(-1, Math.min(1, stick.x));
  const jy = Math.max(-1, Math.min(1, stick.y));
  const [dotX, dotY] = toScreen(jx, jy);
  ctx.strokeStyle = isLeft ? "rgba(233,69,96,0.25)" : "rgba(77,124,245,0.25)";
  ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(dotX, cy); ctx.lineTo(dotX, dotY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, dotY); ctx.lineTo(dotX, dotY); ctx.stroke();
  ctx.setLineDash([]);
  const grad = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 12);
  grad.addColorStop(0, isLeft ? "rgba(233,69,96,0.5)" : "rgba(77,124,245,0.5)");
  grad.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(dotX, dotY, 12, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(dotX, dotY, 4, 0, Math.PI*2);
  ctx.fillStyle = isLeft ? "#e94560" : "#4d7cf5";
  ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke();
}

function getCellLabel(index, isLeft) {
  const layout = matrixMode === "fn" ? FN_LAYOUT : BASE_LAYOUT;
  const col = index % 5;
  const row = Math.floor(index / 5);
  return layout[row][isLeft ? col : col + 5];
}

// ==================== CANVAS MOUSE INTERACTION ====================
["canvasL","canvasR"].forEach(id => {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const side = id === "canvasL" ? "L" : "R";
  function handler(e) {
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.width / rect.width;
    const mx = (e.clientX - rect.left) * scale;
    const my = (e.clientY - rect.top) * scale;
    const c = initCanvas(canvas);
    const verts = (side === "L" ? config.joystick_grid.left : config.joystick_grid.right).vertices;
    const t = e.type;

    if (t === "mousedown" || t === "touchstart") {
      for (let i = 0; i < verts.length; i++) {
        const [sx, sy] = c.toScreen(verts[i][0], verts[i][1]);
        if (Math.hypot(mx - sx, my - sy) < 12) {
          dragState = { side, vertexIdx: i, offsetX: mx - sx, offsetY: my - sy };
          e.preventDefault(); drawGrid(id, side); return;
        }
      }
    }
    if ((t === "mousemove" || t === "touchmove") && dragState?.side === side) {
      const [wx, wy] = c.toWorld(mx - dragState.offsetX, my - dragState.offsetY);
      verts[dragState.vertexIdx] = [parseFloat(wx.toFixed(4)), parseFloat(wy.toFixed(4))];
      drawGrid(id, side); updateCoordsDisplay(); setDirty(true); e.preventDefault();
    }
    if ((t === "mouseup" || t === "mouseleave" || t === "touchend" || t === "touchcancel") && dragState?.side === side) {
      dragState = null; e.preventDefault();
    }
  }
  ["mousedown","mousemove","mouseup","mouseleave"].forEach(evt => canvas.addEventListener(evt, handler));
  ["touchstart","touchmove","touchend","touchcancel"].forEach(evt => canvas.addEventListener(evt, handler, { passive: false }));
});

// ==================== MATRIX ====================
function renderMatrix() {
  ["L","R"].forEach(side => {
    const container = document.getElementById(side === "L" ? "matrixL" : "matrixR");
    container.innerHTML = "";
    const isActive = (side === "L" && pressedL3) || (side === "R" && pressedR3);
    for (let i = 0; i < 15; i++) {
      const cell = document.createElement("div");
      cell.className = "matrix-cell cell-" + side.toLowerCase();
      if (selectedCell[side] === i) {
        cell.classList.add("cell-selected");
        if (isActive) cell.classList.add("cell-active");
      }
      cell.textContent = getCellLabel(i, side === "L");
      cell.title = getCellLabel(i, side === "L");
      cell.addEventListener("click", () => {
        selectedCell[side] = selectedCell[side] === i ? null : i;
        renderMatrix();
      });
      container.appendChild(cell);
    }
  });
}

        const valSpan = document.createElement("span"); valSpan.style.fontSize = "11px"; valSpan.style.color = "var(--text-dim)"; valSpan.style.minWidth = "35px"; valSpan.style.textAlign = "right"; valSpan.textContent = currentVal;
        inp.addEventListener("input", () => { const v = parseFloat(inp.value); valSpan.textContent = v.toFixed(2); setConfigValue(keyParts, v); setDirty(true); });
        row.appendChild(inp); row.appendChild(valSpan); wrapper.appendChild(row);
      } else {
        const inp = document.createElement("input"); inp.type = field.type; if (field.min !== undefined) inp.min = field.min; if (field.max !== undefined) inp.max = field.max; inp.value = currentVal;
        inp.addEventListener("change", () => { const v = field.type === "number" ? (inp.value.includes(".") ? parseFloat(inp.value) : parseInt(inp.value)) : inp.value; setConfigValue(keyParts, v); setDirty(true); });
        wrapper.appendChild(inp);
      }
      form.appendChild(wrapper);
    });
  });
}

function setConfigValue(key, value) {
  const parts = key.split("."); let obj = config;
  for (let p = 0; p < parts.length - 1; p++) obj = obj[parts[p]];
  obj[parts[parts.length-1]] = value;
}

// ==================== DIRTY / SAVE ====================
function setDirty(d) { dirty = d; document.getElementById("saveBtn").disabled = !d; document.getElementById("saveStatus").textContent = d ? "⚠️ 未保存" : "✅ 已保存"; }
document.getElementById("saveBtn").addEventListener("click", () => {
  document.getElementById("saveStatus").textContent = "💾 保存中...";
  fetch("/api/config", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(config) })
    .then(r => r.json()).then(() => setDirty(false))
    .catch(() => { console.log("Save:", JSON.stringify(config,null,2)); setDirty(false); document.getElementById("saveStatus").textContent = "✅ 已保存（离线）"; });
});
document.addEventListener("keydown", e => { if ((e.ctrlKey||e.metaKey) && e.key==="s") { e.preventDefault(); document.getElementById("saveBtn").click(); }});

// ==================== WEBSOCKET / MOCK ====================
function connectWebSocket() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { document.getElementById("statusDot").className = "status-dot connected"; document.getElementById("statusText").textContent = "已连接"; };
  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === "joystick") {
        rawJoystickState.L.x = data.raw?.L?.x ?? data.L?.x ?? rawJoystickState.L.x;
        rawJoystickState.L.y = data.raw?.L?.y ?? data.L?.y ?? rawJoystickState.L.y;
        rawJoystickState.R.x = data.raw?.R?.x ?? data.R?.x ?? rawJoystickState.R.x;
        rawJoystickState.R.y = data.raw?.R?.y ?? data.R?.y ?? rawJoystickState.R.y;
        joystickState.L.x = data.L?.x ?? joystickState.L.x;
        joystickState.L.y = data.L?.y ?? joystickState.L.y;
        joystickState.R.x = data.R?.x ?? joystickState.R.x;
        joystickState.R.y = data.R?.y ?? joystickState.R.y;
        updateCoordsDisplay();
        updateCalCoordsDisplay();
        drawGrid("canvasL", "L"); drawGrid("canvasR", "R");
        drawCalGrid("canvasRawL", "L", true);
        drawCalGrid("canvasRawR", "R", true);
        drawCalGrid("canvasCalL", "L", false);
        drawCalGrid("canvasCalR", "R", false);
      }
      // Buttons from new format (object with names)
      if (data.buttons && typeof data.buttons === "object") {
        pressedL3 = !!data.buttons["L3"];
        pressedR3 = !!data.buttons["R3"];
        renderMatrix();
      }
    } catch(e) {}
  };
  ws.onopen = () => {
    document.getElementById("statusDot").className = "status-dot connected";
    document.getElementById("statusText").textContent = "已连接";
    loadConfig(); // 连接后同步后端配置
  };
  ws.onclose = () => { document.getElementById("statusDot").className = "status-dot disconnected"; document.getElementById("statusText").textContent = "未连接"; setTimeout(connectWebSocket, 2000); };
  ws.onerror = () => ws.close();
}

let mockInterval = null;
function startMockData() {
  let t = 0;
  mockInterval = setInterval(() => {
    t += 0.05;
    // Raw values (before calibration)
    rawJoystickState.L = { x: Math.sin(t)*0.85, y: Math.cos(t*0.8)*0.75 };
    rawJoystickState.R = { x: Math.sin(t*1.2)*0.7, y: Math.cos(t*0.6)*0.6 };
    // Apply deadzone & curve to simulate calibrated output
    function calibrate(v, side) {
      const sk = side === "L" ? "left" : "right";
      const dz = config.joystick[sk].deadzone.center;
      const curve = config.joystick[sk].curve.power;
      const abs = Math.abs(v); const sign = Math.sign(v);
      if (abs < dz) return 0;
      const mapped = (abs - dz) / (1 - dz);
      return sign * Math.pow(mapped, 1/curve);
    }
    joystickState.L = { x: calibrate(rawJoystickState.L.x, "L"), y: calibrate(rawJoystickState.L.y, "L") };
    joystickState.R = { x: calibrate(rawJoystickState.R.x, "R"), y: calibrate(rawJoystickState.R.y, "R") };
    pressedL3 = Math.sin(t*0.3) > 0.8; pressedR3 = Math.sin(t*0.3+1) > 0.8;
    updateCoordsDisplay();
    updateCalCoordsDisplay();
    drawGrid("canvasL", "L"); drawGrid("canvasR", "R");
    drawCalGrid("canvasRawL", "L", true);
    drawCalGrid("canvasRawR", "R", true);
    drawCalGrid("canvasCalL", "L", false);
    drawCalGrid("canvasCalR", "R", false);
    renderMatrix();
    document.getElementById("statusDot").className = pressedL3 ? "status-dot connected" : "status-dot disconnected";
    document.getElementById("statusText").textContent = "🔄 模拟数据";
  }, 50);
}

// ==================== INIT ====================
function loadConfig() {
  fetch("/api/config")
    .then(r => r.json())
    .then(cfg => {
      // Deep merge: keep UI-only fields, overwrite backend fields
      function deepMerge(target, src) {
        for (const k of Object.keys(src)) {
          if (src[k] && typeof src[k] === "object" && !Array.isArray(src[k])) {
            if (!target[k]) target[k] = {};
            deepMerge(target[k], src[k]);
          } else {
            target[k] = src[k];
          }
        }
      }
      deepMerge(config, cfg);
      // Rebuild UI with fetched config
      buildConfigForm();
      buildCalibrateForm();
      renderMatrix();
      drawGrid("canvasL", "L"); drawGrid("canvasR", "R");
      drawCalGrid("canvasRawL", "L", true);
      drawCalGrid("canvasRawR", "R", true);
      drawCalGrid("canvasCalL", "L", false);
      drawCalGrid("canvasCalR", "R", false);
      updateCoordsDisplay();
      updateCalCoordsDisplay();
      setDirty(false);
    })
    .catch(() => {
      // 后端不可用时使用默认配置
    });
}

function init() {
  loadConfig();
  buildConfigForm();
  buildCalibrateForm();
  renderMatrix();
  drawGrid("canvasL", "L"); drawGrid("canvasR", "R");
  drawCalGrid("canvasRawL", "L", true);
  drawCalGrid("canvasRawR", "R", true);
  drawCalGrid("canvasCalL", "L", false);
  drawCalGrid("canvasCalR", "R", false);
  updateCoordsDisplay();
  updateCalCoordsDisplay();
  setDirty(false);
  // Always try WS first, fallback to mock after 3s
  connectWebSocket();
  setTimeout(() => { if (document.getElementById("statusText").textContent === "未连接") startMockData(); }, 3000);
}

document.addEventListener("keydown", e => {
  if ((e.ctrlKey||e.metaKey) && e.key==="m") { e.preventDefault(); matrixMode = matrixMode==="base"?"fn":"base"; renderMatrix(); drawGrid("canvasL","L"); drawGrid("canvasR","R"); }
});
document.addEventListener("DOMContentLoaded", init);
